# ================================================================
# Quantity Measurement Application - Configuration
# UC17: Spring Boot REST Service with JPA
# ================================================================

spring.application.name=quantity-measurement-app

# ----------------------------------------------------------------
# H2 In-Memory Database (Development)
# ----------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ----------------------------------------------------------------
# JPA / Hibernate Configuration
# ----------------------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ----------------------------------------------------------------
# H2 Console (Development)
# ----------------------------------------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ----------------------------------------------------------------
# Connection Pool
# ----------------------------------------------------------------
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ----------------------------------------------------------------
# Logging
# ----------------------------------------------------------------
logging.level.com.app.quantitymeasurement=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ----------------------------------------------------------------
# SpringDoc / Swagger UI
# ----------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ----------------------------------------------------------------
# Actuator
# ----------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ----------------------------------------------------------------
# Google OAuth2 / Spring Security (UC18)
# ----------------------------------------------------------------
# Set these via environment variables or application-local.properties (do NOT commit secrets!)
# GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET must be obtained from:
#   https://console.cloud.google.com/ → APIs & Services → Credentials → OAuth 2.0 Client IDs
#
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:REPLACE_ME}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:REPLACE_ME}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
# Actuator CORS
management.endpoints.web.cors.allowed-origins=http://localhost:4200
management.endpoints.web.cors.allowed-methods=GET,POST
server.port=8084
