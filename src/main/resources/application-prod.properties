# ================================================================
# Quantity Measurement - Production Profile
# UC17: Spring Boot REST Service
# Activate with: --spring.profiles.active=prod
# ================================================================

# ----------------------------------------------------------------
# MySQL Production Database
# ----------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/quantity_measurement_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----------------------------------------------------------------
# JPA / Hibernate (Production)
# ----------------------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ----------------------------------------------------------------
# H2 Console (disabled in production)
# ----------------------------------------------------------------
spring.h2.console.enabled=false

# ----------------------------------------------------------------
# Logging (Production - reduce verbosity)
# ----------------------------------------------------------------
logging.level.root=WARN
logging.level.com.app.quantitymeasurement=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# ----------------------------------------------------------------
# Actuator (Production - restrict details)
# ----------------------------------------------------------------
management.endpoint.health.show-details=never
management.endpoints.web.exposure.include=health,info
