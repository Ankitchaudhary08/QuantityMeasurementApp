# ================================================================
# History Service — application.yml
# Port: 8083
# Responsibilities: Audit trail and history queries
# ================================================================

server:
  port: 8083

spring:
  application:
    name: history-service

  datasource:
    url: ${DB_URL:jdbc:h2:mem:historydb;DB_CLOSE_DELAY=-1;MODE=MySQL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    database-platform: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: health,info
