# ================================================================
# API Gateway — application.yml
# Port: 8090
# Aggregates routes to: user-service (8081), measurement-service (8082), history-service (8083)
# ================================================================

server:
  port: 8090

spring:
  application:
    name: api-gateway

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - ${ALLOWED_ORIGIN_LOCAL:http://localhost:4200}
              - ${ALLOWED_ORIGIN_S3:http://quantity-measurement-frontend-ankit.s3-website-us-east-1.amazonaws.com}
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        - id: user-service-auth
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**

        - id: user-service-users
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: JwtAuthenticationFilter

        - id: measurement-service
          uri: ${MEASUREMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/quantities/**
          filters:
            - name: JwtAuthenticationFilter

        - id: history-service
          uri: ${HISTORY_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/history/**
          filters:
            - name: JwtAuthenticationFilter

        # Swagger API Documentation Routes
        - id: user-service-docs
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api-docs/user
          filters:
            - RewritePath=/api-docs/user, /v3/api-docs

        - id: measurement-service-docs
          uri: ${MEASUREMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api-docs/measurement
          filters:
            - RewritePath=/api-docs/measurement, /v3/api-docs

        - id: history-service-docs
          uri: ${HISTORY_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api-docs/history
          filters:
            - RewritePath=/api-docs/history, /v3/api-docs

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    urls:
      - name: User Service
        url: /api-docs/user
        displayName: User Service
      - name: Measurement Service
        url: /api-docs/measurement
        displayName: Measurement Service
      - name: History Service
        url: /api-docs/history
        displayName: History Service

jwt:
  secret: ${JWT_SECRET}

# ----------------------------------------------------------------
# Actuator
# ----------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

# ----------------------------------------------------------------
# Logging
# ----------------------------------------------------------------
logging:
  level:
    com.app.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    reactor.netty: INFO
