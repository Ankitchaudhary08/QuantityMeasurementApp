# ================================================================
# Quantity Measurement Application - Configuration
# UC16: Database Integration with JDBC
# ================================================================

# ----------------------------------------------------------------
# Repository Configuration
# Options: cache | database
# ----------------------------------------------------------------
repository.type=database

# ----------------------------------------------------------------
# H2 In-Memory Database (Development / Default)
# ----------------------------------------------------------------
db.url=jdbc:h2:mem:quantitydb;DB_CLOSE_DELAY=-1;MODE=MySQL
db.username=sa
db.password=
db.driver=org.h2.Driver
db.pool.size=5
db.connection.timeout=30000
db.idle.timeout=600000

# ----------------------------------------------------------------
# MySQL Production Database (uncomment when using MySQL)
# ----------------------------------------------------------------
# db.url=jdbc:mysql://localhost:3306/quantity_measurement_db?useSSL=false&serverTimezone=UTC
# db.username=root
# db.password=yourpassword
# db.driver=com.mysql.cj.jdbc.Driver

# ----------------------------------------------------------------
# PostgreSQL Production Database (uncomment when using PostgreSQL)
# ----------------------------------------------------------------
# db.url=jdbc:postgresql://localhost:5432/quantity_measurement_db
# db.username=postgres
# db.password=yourpassword
# db.driver=org.postgresql.Driver

# ----------------------------------------------------------------
# Logging Configuration
# ----------------------------------------------------------------
logging.level=INFO
logging.format=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
